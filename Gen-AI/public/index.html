<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gen-AI Input Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 40px;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
      }
      input {
        padding: 0.5rem;
        width: min(400px, 100%);
      }
      button {
        margin-top: 0.75rem;
        padding: 0.5rem 1rem;
      }
      pre {
        background: #f7f7f7;
        padding: 1rem;
        border-radius: 6px;
        max-width: 600px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>Enter Input</h1>
    <form id="inputForm">
      <label for="inputText">Your input</label>
      <input id="inputText" name="input" type="text" placeholder="Type something..." required />
      <button type="submit">Send</button>
    </form>

    <h2>Response</h2>
    <pre id="response">Waiting for input…</pre>

    <script>
      const form = document.getElementById("inputForm");
      const responseEl = document.getElementById("response");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const input = document.getElementById("inputText").value.trim();
        if (!input) return;

        responseEl.textContent = "Sending...";

        try {
          const res = await fetch("/api/input", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input }),
          });

          const data = await res.json();

          if (!res.ok) {
            responseEl.textContent = `Error: ${data.error ?? res.statusText}`;
            return;
          }

          responseEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          responseEl.textContent = `Network error: ${err.message}`;
        }
      });
    </script>
  </body>
</html>
